<!doctype html>
<html lang="en" data-theme="{{ theme }}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fnine</title>
        <link rel="stylesheet" href="/static/css/style.css" />
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-inner">
                <a href="/?lang={{ t.lang() }}&theme={{ theme }}" class="brand"
                    >📚 Fnine</a
                >
                <div class="nav-links">
                    <a href="/?lang={{ t.lang() }}&theme={{ theme }}"
                        >{{ t.get("nav.home") }}</a
                    >
                    <a href="/upload?lang={{ t.lang() }}&theme={{ theme }}"
                        >{{ t.get("nav.upload") }}</a
                    >
                    <a href="/settings?lang={{ t.lang() }}&theme={{ theme }}"
                        >{{ t.get("nav.settings") }}</a
                    >
                </div>
            </div>
        </nav>

        <main class="container">{% block content %}{% endblock %}</main>
    </body>
</html>
