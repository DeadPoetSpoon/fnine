{% extends "base.html" %} {% block content %}
<form
    action="/upload?lang={{ t.lang() }}&theme={{ theme }}"
    method="post"
    enctype="multipart/form-data"
    class="upload-form"
>
    <div class="form-group">
        <label for="file-input" class="file-label">
            <div class="file-dropzone">
                <span class="file-icon">📂</span>
                <p>{{ t.get("book.upload_title") }}</p>
                <p class="file-hint">{{ t.get("book.upload_hint") }}</p>
            </div>
        </label>
        <input
            type="file"
            id="file-input"
            name="epub"
            accept=".epub"
            required
            class="file-input"
        />
    </div>
    <div class="form-actions">
        <button type="submit" class="btn btn-primary">
            {{ t.get("book.upload_btn") }}
        </button>
        <a
            href="/?lang={{ t.lang() }}&theme={{ theme }}"
            class="btn btn-secondary"
            >{{ t.get("book.cancel") }}</a
        >
    </div>
</form>
<script>
    document
        .getElementById("file-input")
        .addEventListener("change", function (e) {
            var file = e.target.files[0];
            if (file) {
                var dz = document.querySelector(".file-dropzone");
                dz.querySelector(".file-icon").textContent = "📚";
                dz.querySelector("p").textContent = file.name;
                dz.querySelector(".file-hint").textContent =
                    (file.size / 1024 / 1024).toFixed(1) + " MB";
                dz.classList.add("has-file");
            }
        });
</script>
{% endblock %}
